version: '3.8'
services:
  db:
    image: postgres:15
    container_name: smartcrop_db
    environment:
      POSTGRES_DB: smartcrop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: