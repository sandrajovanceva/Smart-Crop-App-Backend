services:
  db:
    image: postgres:15
    container_name: smartcrop_db
    environment:
      POSTGRES_DB: smartcrop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d smartcrop" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:123@db:5432/smartcrop
      FLASK_APP: run.py
      FLASK_RUN_HOST: 0.0.0.0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
